name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            output: utilities-cli-linux-amd64
          - os: linux
            arch: arm64
            output: utilities-cli-linux-arm64
          - os: windows
            arch: amd64
            output: utilities-cli-windows-amd64.exe
          - os: windows
            arch: arm64
            output: utilities-cli-windows-arm64.exe
          - os: darwin
            arch: amd64
            output: utilities-cli-darwin-amd64
          - os: darwin
            arch: arm64
            output: utilities-cli-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME}
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
